name: Update Branch Contributions

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  update-graph:
    runs-on: ubuntu-latest
    env:
      GITHUB_USERNAME: ${{ github.repository_owner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate graph
        run: python3 generate_graph.py

      - name: Commit updated SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update branch contributions graph"
          file_pattern: assets/branch-contributions.svg
